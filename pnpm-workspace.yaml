packages:
  # specify a package in a direct subdir of the root
  - 'apps/ecosystem/meeovi-frontend*'
  # all packages in direct subdirs of packages/
  - 'packages/*'
  # all packages in subdirs of docs/
  - 'docs/**'
  # all packages in subdirs of components/
  - 'layers/**'
  # all packages in subdirs of integrations/
  - 'integrations/**'
  # all packages in subdirs of themes/
  - 'themes/**'
  # exclude packages that are inside test directories
  - '!**/test/**'
  - '!**/backups/**'