# Mesh Base Configuration
# 
# Common configuration shared across all environments.
# Environment-specific overrides are applied on top of this.

meshConfig:
  - baseDir: .

serve:
  port: 4000
  hostname: localhost
  playground: true
  introspection: true

documents:
  - ./app/domain/operations/*.graphql

additionalTypeDefs: |
  directive @auth(roles: [String!]) on FIELD_DEFINITION
  directive @rateLimit(limit: Int!, window: Int!) on FIELD_DEFINITION

logger:
  level: info

# Sources will be dynamically added by active adapter
sources: []

# Transforms will be extended by adapter transforms
transforms:
  - type: Namespacing
    config:
      ignore:
        - Query
        - Mutation
        - Subscription
        - String
        - Boolean
        - Int
        - Float
        - ID

# Security policies
policies:
  - type: rbac
    config:
      requiresAuth: true

# Caching
caching:
  enabled: true
  ttl: 3600
