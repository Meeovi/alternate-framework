# Mesh Production Configuration
# 
# Environment-specific overrides for production.
# Optimized for performance, security, and reliability.

serve:
  port: 4000
  hostname: 0.0.0.0
  playground: false
  introspection: false

logger:
  level: warn

# Production prioritizes performance and security
caching:
  enabled: true
  ttl: 3600

policies:
  - type: rbac
    config:
      requiresAuth: true
      debug: false
  - type: rateLimit
    config:
      windowMs: 60000
      maxRequests: 1000
