# Mesh Development Configuration
# 
# Environment-specific overrides for local development.
# Enables debugging and detailed logging.

serve:
  port: 4000
  hostname: 0.0.0.0
  playground: true
  introspection: true
  tracing: true

logger:
  level: debug

# Development optimizations
caching:
  enabled: false
  ttl: 0

policies:
  - type: rbac
    config:
      requiresAuth: false
      debug: true
