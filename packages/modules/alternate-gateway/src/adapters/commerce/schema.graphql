extend type Query {
  commerceGetProduct(id: ID!): CommerceProduct
  commerceGetCart(id: ID!): CommerceCart
}

extend type Mutation {
  commerceCheckout(input: CommerceCheckoutInput!): CommerceOrder!
}

type CommerceProduct {
  id: ID!
  title: String!
  price: Float!
  currency: String!
}

type CommerceCart {
  id: ID!
  items: [CommerceProduct!]!
  total: Float!
}

input CommerceCheckoutInput {
  cartId: ID!
  paymentToken: String!
}

type CommerceOrder {
  id: ID!
  status: String!
  total: Float!
}