# Product Queries

query GetProductBySlug($slug: String!) {
  products(filter: { url_key: { eq: $slug } }) {
    items {
      uid
      sku
      name
      url_key
      description {
        html
      }
      short_description {
        html
      }
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
          regular_price {
            value
            currency
          }
        }
      }
      media_gallery {
        url
        label
      }
      categories {
        uid
        name
        url_path
      }
      ... on ConfigurableProduct {
        configurable_options {
          uid
          label
          attribute_code
          values {
            uid
            label
          }
        }
        variants {
          product {
            uid
            sku
            name
            price_range {
              minimum_price {
                final_price {
                  value
                  currency
                }
              }
            }
          }
        }
      }
    }
  }
}

query GetProductBySku($sku: String!) {
  products(filter: { sku: { eq: $sku } }) {
    items {
      uid
      sku
      name
      url_key
      description {
        html
      }
      short_description {
        html
      }
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
          regular_price {
            value
            currency
          }
        }
      }
      media_gallery {
        url
        label
      }
      categories {
        uid
        name
        url_path
      }
    }
  }
}

query GetProducts($search: String!, $pageSize: Int, $currentPage: Int, $categoryId: String) {
  products(
    search: $search
    pageSize: $pageSize
    currentPage: $currentPage
    filter: { category_uid: { eq: $categoryId } }
  ) {
    items {
      uid
      sku
      name
      url_key
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
        }
      }
      media_gallery {
        url
        label
      }
      categories {
        uid
        name
      }
    }
    page_info {
      current_page
      total_pages
      page_size
    }
    total_count
  }
}

# Category Queries

query GetCategoryTree {
  categories(filters: { ids: { eq: "2" } }) {
    items {
      uid
      name
      url_path
      children {
        uid
        name
        url_path
        children {
          uid
          name
          url_path
        }
      }
    }
  }
}

query GetCategory($id: Int!) {
  category(id: $id) {
    uid
    name
    url_path
    description
    product_count
    children {
      uid
      name
      url_path
    }
  }
}

# Cart Queries and Mutations

query GetCart($cartId: String!) {
  cart(cart_id: $cartId) {
    id
    email
    items {
      uid
      quantity
      product {
        uid
        sku
        name
        url_key
        price_range {
          minimum_price {
            final_price {
              value
              currency
            }
          }
        }
        media_gallery {
          url
          label
        }
      }
      prices {
        price {
          value
          currency
        }
        row_total {
          value
          currency
        }
      }
    }
    prices {
      grand_total {
        value
        currency
      }
      subtotal_excluding_tax {
        value
        currency
      }
    }
  }
}

mutation CreateEmptyCart {
  createEmptyCart
}

mutation AddSimpleProductToCart($cartId: String!, $sku: String!, $quantity: Float!) {
  addSimpleProductsToCart(
    input: {
      cart_id: $cartId
      cart_items: [{ data: { quantity: $quantity, sku: $sku } }]
    }
  ) {
    cart {
      id
      items {
        uid
        quantity
        product {
          uid
          sku
          name
          url_key
        }
        prices {
          price {
            value
            currency
          }
        }
      }
      prices {
        grand_total {
          value
          currency
        }
      }
    }
  }
}

mutation AddConfigurableProductToCart(
  $cartId: String!
  $parentSku: String!
  $quantity: Float!
  $selectedOptions: [ID!]!
) {
  addConfigurableProductsToCart(
    input: {
      cart_id: $cartId
      cart_items: [
        {
          data: { quantity: $quantity, sku: $parentSku }
          variant_sku: $parentSku
          customizable_options: []
        }
      ]
    }
  ) {
    cart {
      id
      items {
        uid
        quantity
        product {
          uid
          sku
          name
        }
      }
      prices {
        grand_total {
          value
          currency
        }
      }
    }
  }
}

mutation UpdateCartItems($cartId: String!, $itemId: ID!, $quantity: Float!) {
  updateCartItems(
    input: { cart_id: $cartId, cart_items: [{ cart_item_uid: $itemId, quantity: $quantity }] }
  ) {
    cart {
      id
      items {
        uid
        quantity
      }
      prices {
        grand_total {
          value
          currency
        }
      }
    }
  }
}

mutation RemoveItemFromCart($cartId: String!, $itemId: ID!) {
  removeItemFromCart(input: { cart_id: $cartId, cart_item_uid: $itemId }) {
    cart {
      id
      items {
        uid
        quantity
      }
      prices {
        grand_total {
          value
          currency
        }
      }
    }
  }
}

# Customer Queries

query GetCustomer {
  customer {
    email
    firstname
    lastname
  }
}

mutation GenerateCustomerToken($email: String!, $password: String!) {
  generateCustomerToken(email: $email, password: $password) {
    token
  }
}

mutation CreateCustomerV2($input: CustomerCreateInput!) {
  createCustomerV2(input: $input) {
    customer {
      id
      firstname
      lastname
      email
      is_subscribed
    }
  }
}

mutation CreateCustomer($input: CustomerInput!) {
  createCustomer(input: $input) {
    customer {
      id
      firstname
      lastname
      email
    }
  }
}

mutation RevokeCustomerToken {
  revokeCustomerToken {
    result
  }
}

query IsEmailAvailable($email: String!) {
  isEmailAvailable(email: $email) {
    is_email_available
  }
}
