# Magento GraphQL Operations

query GetProducts($pageSize: Int = 20, $currentPage: Int = 1) {
  products(pageSize: $pageSize, currentPage: $currentPage) {
    items {
      id
      sku
      name
      type_id
      description {
        html
      }
      short_description {
        html
      }
      price_range {
        minimum_price {
          regular_price {
            value
            currency
          }
          final_price {
            value
            currency
          }
          discount {
            amount_off
            percent_off
          }
        }
        maximum_price {
          regular_price {
            value
            currency
          }
          final_price {
            value
            currency
          }
        }
      }
      image {
        url
        label
      }
      media_gallery {
        url
        label
        position
        disabled
      }
      stock_status
      review_count
      rating_summary
    }
    page_info {
      page_size
      current_page
      total_pages
    }
    total_count
  }
}

query GetProductBySku($sku: String!) {
  products(filter: { sku: { eq: $sku } }) {
    items {
      id
      sku
      name
      description {
        html
      }
      short_description {
        html
      }
      price_range {
        minimum_price {
          regular_price {
            value
            currency
          }
          final_price {
            value
            currency
          }
        }
      }
      image {
        url
        label
      }
      media_gallery {
        url
        label
      }
      stock_status
      reviews {
        items {
          summary
          text
          rating_value
          created_at
          nickname
        }
      }
    }
  }
}

query GetCart($cartId: String!) {
  cart(cart_id: $cartId) {
    id
    email
    items {
      id
      product {
        id
        sku
        name
        image {
          url
          label
        }
      }
      quantity
      prices {
        price {
          value
          currency
        }
        row_total {
          value
          currency
        }
        row_total_including_tax {
          value
          currency
        }
        discounts {
          amount {
            value
            currency
          }
          label
        }
      }
    }
    prices {
      subtotal_including_tax {
        value
        currency
      }
      grand_total {
        value
        currency
      }
      discounts {
        amount {
          value
          currency
        }
        label
      }
      applied_taxes {
        amount {
          value
          currency
        }
        label
      }
    }
    shipping_addresses {
      firstname
      lastname
      street
      city
      region {
        code
        label
      }
      postcode
      country {
        code
        label
      }
      telephone
      selected_shipping_method {
        carrier_code
        method_code
        carrier_title
        method_title
        amount {
          value
          currency
        }
      }
    }
    billing_address {
      firstname
      lastname
      street
      city
      region {
        code
      }
      postcode
      country {
        code
      }
      telephone
    }
  }
}

query GetCustomer {
  customer {
    id
    firstname
    lastname
    email
    is_subscribed
    addresses {
      id
      firstname
      lastname
      street
      city
      region {
        region_code
        region
      }
      postcode
      country_code
      telephone
      default_shipping
      default_billing
    }
    orders(pageSize: 10) {
      total_count
      items {
        id
        order_number
        status
        created_at
        grand_total {
          value
          currency
        }
        items {
          id
          product_name
          product_sku
          quantity_ordered
          product_sale_price {
            value
            currency
          }
        }
      }
    }
  }
}

mutation CreateCart {
  createEmptyCart
}

mutation AddProductsToCart($cartId: String!, $cartItems: [CartItemInput!]!) {
  addProductsToCart(cartId: $cartId, cartItems: $cartItems) {
    cart {
      id
      items {
        id
        quantity
        product {
          id
          name
        }
      }
    }
    user_errors {
      message
      code
    }
  }
}

mutation SetBillingAddressOnCart($cartId: String!, $address: BillingAddressInput!) {
  setBillingAddressOnCart(input: { cart_id: $cartId, billing_address: $address }) {
    cart {
      id
      billing_address {
        street
        city
        region {
          code
        }
        postcode
        country {
          code
        }
      }
    }
  }
}

mutation SetShippingAddressesOnCart($cartId: String!, $address: ShippingAddressInput!) {
  setShippingAddressesOnCart(input: { cart_id: $cartId, shipping_addresses: [$address] }) {
    cart {
      id
      shipping_addresses {
        street
        city
      }
    }
  }
}

mutation SetShippingMethodsOnCart($cartId: String!, $method: ShippingMethodInput!) {
  setShippingMethodsOnCart(input: { cart_id: $cartId, shipping_methods: [$method] }) {
    cart {
      id
      shipping_addresses {
        selected_shipping_method {
          carrier_code
          method_code
          method_title
          amount {
            value
            currency
          }
        }
      }
    }
  }
}

mutation PlaceOrder($cartId: String!) {
  placeOrder(input: { cart_id: $cartId }) {
    order {
      order_number
    }
  }
}
