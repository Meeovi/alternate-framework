name: Invariants

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  invariants:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run invariant checks
        run: npm run check:invariants

      - name: Run workspace typecheck
        run: npm run typecheck
